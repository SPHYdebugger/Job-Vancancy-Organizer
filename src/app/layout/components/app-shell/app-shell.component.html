<div class="app-shell">
  <button
    class="mobile-overlay"
    type="button"
    aria-label="Close navigation"
    [class.visible]="isSidebarOpen()"
    (click)="closeSidebar()"></button>

  <aside class="sidebar" [class.open]="isSidebarOpen()">
    <div class="brand">
      <img class="brand-logo" src="/assets/images/JVO_logo.png" alt="JVO logo" />
      
      <h1>JVO Workspace</h1>
    </div>

    <nav class="nav-list">
      @for (item of navigationItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/app/vacancies' }"
          (click)="closeSidebar()">
          <span class="label">{{ item.label }}</span>
          <span class="description">{{ item.description }}</span>
        </a>
      }
    </nav>

    <div class="sidebar-footer">
      <a class="signout-link" routerLink="/auth/login" (click)="logout()">Sign Out</a>
    </div>
  </aside>

  <div class="content-area">
    <button class="menu-button menu-button-inline" type="button" aria-label="Toggle navigation" (click)="toggleSidebar()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <main class="page-content" [@routeTransition]="router.url">
      <router-outlet />
    </main>
  </div>
</div>
